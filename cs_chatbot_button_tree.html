const log = document.getElementById('log');
let currentBtns = null;

function addBot(text) {
  const d = document.createElement('div');
  d.className = 'bubble bot';
  d.innerHTML = `<div class="av">CS</div><div class="msg">${text.replace(/\n/g,'<br>')}</div>`;
  log.appendChild(d);
}
function addUser(text) {
  const d = document.createElement('div');
  d.className = 'bubble user';
  d.innerHTML = `<div class="msg">${text}</div>`;
  log.appendChild(d);
}
function addBtns(btns) {
  if (currentBtns) currentBtns.remove();
  const row = document.createElement('div');
  row.className = 'btns';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.l;
    btn.onclick = () => choose(b.l, b.n);
    row.appendChild(btn);
  });
  log.appendChild(row);
  currentBtns = row;
  log.scrollTop = log.scrollHeight;
}
function choose(label, next) {
  if (currentBtns) { currentBtns.remove(); currentBtns = null; }
  addUser(label);
  setTimeout(() => showNode(next), 250);
}
function showNode(id) {
  const node = T[id];
  addBot(node.msg);
  if (node.btns) addBtns(node.btns);
  log.scrollTop = log.scrollHeight;
}
function restart() {
  log.innerHTML = '';
  currentBtns = null;
  showNode('start');
}
restart();
